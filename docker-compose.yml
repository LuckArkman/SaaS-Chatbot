services:
  saas_postgres:
    image: postgres:16-alpine
    container_name: saas_postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=saas_omnichannel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  saas_redis:
    image: redis:7-alpine
    container_name: saas_redis
    ports:
      - "6379:6379"
    restart: always

  saas_rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: saas_rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=password123
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  saas_mongo:
    image: mongo:7
    container_name: saas_mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=saas_chatbot
      - MONGO_INITDB_ROOT_PASSWORD=3702959
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  saas_node_api:
    build:
      context: ./node-version
      dockerfile: Dockerfile
    container_name: saas_node_api
    depends_on:
      - saas_postgres
      - saas_redis
      - saas_rabbitmq
      - saas_mongo
    environment:
      - DOCKER_CONTAINER=true
      - POSTGRES_SERVER=saas_postgres
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=saas_omnichannel
      - MONGODB_URL=mongodb://saas_chatbot:3702959@saas_mongo:27017/SaaS_Chatbot?authSource=admin
      - REDIS_URL=redis://saas_redis:6379/0
      - RABBITMQ_URL=amqp://admin:password123@saas_rabbitmq/
      - GEMINI_API_KEY=sua_api_key_aqui
    ports:
      - "8001:8000"
    volumes:
      - ./node-version/uploads:/app/uploads
      - ./node-version/src/config:/app/src/config # Mapeamento opcional
    restart: always

volumes:
  postgres_data:
  mongo_data:
