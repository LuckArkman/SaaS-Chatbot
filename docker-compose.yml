services:
  saas_postgres:
    image: postgres:16-alpine
    container_name: saas_postgres
    network_mode: host
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=SaaS_OmniChannel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  saas_redis:
    image: redis:7-alpine
    container_name: saas_redis
    network_mode: host
    restart: always

  saas_rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: saas_rabbitmq
    network_mode: host
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=password123
    restart: always

  saas_mongo:
    image: mongo:7
    container_name: saas_mongo
    network_mode: host
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  postgres_data:
  mongo_data:
