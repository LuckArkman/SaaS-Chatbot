services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    container_name: saas_postgres
    restart: always
    network_mode: host
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 3702959
      POSTGRES_DB: saas_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: always
    network_mode: host

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: saas_rabbitmq
    restart: always
    network_mode: host
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123

  mongo:
    image: mongo:7
    container_name: saas_mongo
    restart: always
    network_mode: host
    volumes:
      - mongo_data:/data/db

  # --- Core Microservices ---
  identity-api:
    build:
      context: .
      dockerfile: SaaS.OmniChannelPlatform.Services.Identity/Dockerfile
    container_name: saas_identity
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5051
      - ConnectionStrings__DefaultConnection=Host=127.0.0.1;Database=saas_identity;Username=postgres;Password=3702959
      - RabbitMQ__Host=127.0.0.1
    depends_on:
      - postgres
      - rabbitmq

  flow-engine:
    build:
      context: .
      dockerfile: SaaS.OmniChannelPlatform.Services.FlowEngine/Dockerfile
    container_name: saas_flow_engine
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5054
      - ConnectionStrings__DefaultConnection=Host=127.0.0.1;Database=saas_flow;Username=postgres;Password=3702959
      - RabbitMQ__Host=127.0.0.1

  messaging-service:
    build:
      context: .
      dockerfile: SaaS.OmniChannelPlatform.Services.Messaging/Dockerfile
    container_name: saas_messaging
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5056
      - ConnectionStrings__DefaultConnection=Host=127.0.0.1;Database=saas_messaging;Username=postgres;Password=3702959
      - RabbitMQ__Host=127.0.0.1
      - MongoDB__ConnectionString=mongodb://127.0.0.1:27017

  campaign-service:
    build:
      context: .
      dockerfile: SaaS.OmniChannelPlatform.Services.Campaign/Dockerfile
    container_name: saas_campaign
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5057
      - ConnectionStrings__DefaultConnection=Host=127.0.0.1;Database=saas_campaign;Username=postgres;Password=3702959

  channel-gateway:
    build:
      context: .
      dockerfile: SaaS.OmniChannelPlatform.Services.ChannelGateway/Dockerfile
    container_name: saas_channel_gateway
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5058
      - RabbitMQ__Host=127.0.0.1

  whatsapp-bot-venom:
    build:
      context: .
      dockerfile: SaaS.OmniChannelPlatform.Services.WhatsAppBot/Dockerfile
    container_name: saas_whatsapp_venom
    network_mode: host
    volumes:
      - ./SaaS.OmniChannelPlatform.Services.WhatsAppBot/tokens:/app/tokens

  chat-service:
    build:
      context: .
      dockerfile: SaaS.OmniChannelPlatform.Services.Chat/Dockerfile
    container_name: saas_chat
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5055
      - ConnectionStrings__DefaultConnection=Host=127.0.0.1;Database=saas_chat;Username=postgres;Password=3702959

  billing-service:
    build:
      context: .
      dockerfile: SaaS.OmniChannelPlatform.Services.Billing/Dockerfile
    container_name: saas_billing
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5059
      - ConnectionStrings__DefaultConnection=Host=127.0.0.1;Database=saas_billing;Username=postgres;Password=3702959

  # --- UI & Gateways ---
  admin-dashboard:
    build:
      context: .
      dockerfile: SaaS.OmniChannelPlatform.AdminDashboards/Dockerfile
    container_name: saas_admin_dashboard
    network_mode: host
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ApiSettings__BaseUrl=http://127.0.0.1:5051

volumes:
  postgres_data:
  mongo_data: