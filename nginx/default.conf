server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Frontend
    location / {
        proxy_pass http://saas_ui:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/v1/ {
        proxy_pass http://saas_api:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSockets (Real-time Chat)
    # proxy_read_timeout define por quanto tempo o Nginx aguarda dados do backend.
    # Para WebSockets de longa duração, deve ser maior que qualquer timeout de inatividade
    # do cliente (ex: 1h). O keepalive server-side (ping a cada 25s) mantém o tráfego ativo.
    location /api/v1/ws {
        proxy_pass http://saas_api:8000/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ✅ Crítico para WebSockets de longa duração:
        # Sem estes valores, o Nginx usa o padrão global (60s) e corta conexões silenciosamente.
        proxy_read_timeout  3600s;   # 1 hora — nunca corta uma conexão WS ativa
        proxy_send_timeout  3600s;   # 1 hora — mesmo para envios lentos
        proxy_connect_timeout 10s;   # Timeout apenas para o handshake inicial
    }

    # Media Storage
    location /uploads/ {
        proxy_pass http://saas_api:8000/uploads/;
        proxy_set_header Host $host;
    }
}
